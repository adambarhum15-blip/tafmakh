<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>מדריך רמ"ח · תפמ"ק לוד-רמלה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1220; --surface: #161f33; --surface-2: #1e2942; --surface-3: #2a3654;
    --border: #2a3654; --text: #f1f5f9; --text-2: #a5b4cf; --text-3: #6b7a99;
    --accent: #3b82f6; --accent-2: #60a5fa; --accent-bg: rgba(59, 130, 246, 0.15);
    --danger: #ef4444; --danger-bg: rgba(239, 68, 68, 0.13);
    --warning: #f59e0b; --warning-bg: rgba(245, 158, 11, 0.13);
    --success: #10b981; --success-bg: rgba(16, 185, 129, 0.13);
    --purple: #a78bfa; --purple-bg: rgba(167, 139, 250, 0.13);
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Heebo', system-ui, sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; font-size: 15px; }
  .app { min-height: 100vh; padding-bottom: 80px; }
  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
  .top-bar-title { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, var(--accent-2), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .top-bar-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .station-pill { background: var(--surface-2); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--accent-2); cursor: pointer; }
  .station-pill:hover { border-color: var(--accent); }
  .main { max-width: 900px; margin: 0 auto; padding: 16px; }
  @media (min-width: 768px) { .main { padding: 24px; padding-bottom: 24px; } .app { padding-bottom: 24px; } }
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); padding-bottom: max(8px, env(safe-area-inset-bottom)); z-index: 40; }
  .tab-btn { padding: 10px 4px; text-align: center; opacity: 0.55; transition: opacity 0.15s; }
  .tab-btn.active { opacity: 1; }
  .tab-btn-icon { font-size: 20px; }
  .tab-btn-label { font-size: 10px; color: var(--text-2); margin-top: 2px; font-weight: 600; }
  .tab-btn.active .tab-btn-label { color: var(--accent-2); }
  @media (min-width: 768px) {
    .tab-bar { position: sticky; top: 62px; bottom: auto; border-top: none; border-bottom: 1px solid var(--border); max-width: 900px; margin: 0 auto; padding: 0; }
    .tab-btn { padding: 14px 8px; } .tab-btn-icon { font-size: 18px; } .tab-btn-label { font-size: 12px; }
  }
  .screen { display: none; animation: fadeIn 0.2s; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .page-sub { color: var(--text-2); font-size: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 16px; font-weight: 700; }
  .card-body { padding: 16px; }
  .section-header { font-size: 13px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin: 24px 0 10px; }
  .section-header:first-child { margin-top: 0; }
  .morning-hero { background: linear-gradient(135deg, var(--accent-bg), var(--purple-bg)); border: 1px solid var(--accent); border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
  .morning-hero::before { content: "\2615"; position: absolute; top: -20px; left: -10px; font-size: 100px; opacity: 0.08; transform: rotate(-15deg); }
  .morning-hero-greeting { font-size: 13px; color: var(--accent-2); font-weight: 600; margin-bottom: 4px; }
  .morning-hero-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .morning-hero-sub { color: var(--text-2); font-size: 14px; }
  .morning-progress { margin-top: 14px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .morning-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width 0.3s; }
  .morning-progress-text { font-size: 12px; color: var(--text-2); margin-top: 6px; font-weight: 600; }
  .checklist-group { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .checklist-group-header { padding: 12px 16px; background: var(--surface-2); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .checklist-group-title-wrap { display: flex; align-items: center; gap: 10px; }
  .checklist-group-icon { font-size: 20px; }
  .checklist-group-title { font-weight: 700; font-size: 14px; }
  .checklist-group-progress { color: var(--text-3); font-size: 12px; font-weight: 700; background: var(--bg); padding: 3px 10px; border-radius: 10px; }
  .checklist-group-progress.done { background: var(--success-bg); color: var(--success); }
  .checklist-item { padding: 12px 16px; display: flex; gap: 12px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.15s; align-items: flex-start; }
  .checklist-item:hover { background: var(--surface-2); }
  .check-box { width: 22px; height: 22px; border: 2px solid var(--text-3); border-radius: 5px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checklist-item.done .check-box { background: var(--success); border-color: var(--success); }
  .checklist-item.done .check-box::after { content: "\2713"; color: white; font-weight: 800; font-size: 14px; }
  .checklist-item-text { flex: 1; line-height: 1.5; }
  .checklist-item.done .checklist-item-text { text-decoration: line-through; color: var(--text-3); }
  .checklist-item-detail { color: var(--text-2); font-size: 13px; margin-top: 4px; }
  .checklist-item.done .checklist-item-detail { display: none; }
  .reset-btn { width: 100%; background: var(--surface-2); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: var(--text-2); font-weight: 600; margin-top: 16px; transition: all 0.15s; }
  .reset-btn:hover { background: var(--surface-3); color: var(--text); }
  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .search-box input { flex: 1; background: transparent; border: none; color: var(--text); outline: none; direction: rtl; }
  .search-box input::placeholder { color: var(--text-3); }
  .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .event-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .event-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
  .event-tile-icon { font-size: 32px; margin-bottom: 8px; display: block; }
  .event-tile-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .event-tile-class { font-size: 11px; color: var(--text-3); background: var(--surface-2); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; font-weight: 600; }
  .event-tile-class.critical { background: var(--danger-bg); color: var(--danger); }
  .back-btn { color: var(--accent-2); font-weight: 600; margin-bottom: 12px; display: inline-flex; align-items: center; gap: 6px; padding: 6px 0; }
  .back-btn:hover { color: var(--accent); }
  .event-detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .event-detail-icon-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .event-detail-icon { font-size: 36px; }
  .event-detail-title { font-size: 22px; font-weight: 800; }
  .event-detail-classifications { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill { background: var(--surface-2); padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .pill-class { background: var(--accent-bg); color: var(--accent-2); }
  .pill-danger { background: var(--danger-bg); color: var(--danger); }
  .pill-warning { background: var(--warning-bg); color: var(--warning); }
  .pill-success { background: var(--success-bg); color: var(--success); }
  .step-list { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .step-list-title { padding: 14px 16px; background: var(--surface-2); font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .step-list-title .step-list-icon { font-size: 20px; }
  .step { display: flex; gap: 14px; padding: 14px 16px; border-top: 1px solid var(--border); }
  .step:first-of-type { border-top: none; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .step-content { flex: 1; }
  .step-title { font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
  .step-detail { color: var(--text-2); font-size: 13px; line-height: 1.55; }
  .step-detail strong { color: var(--text); }
  .tip-box { margin: 10px 0; padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .tip-box-danger { background: var(--danger-bg); border-right: 3px solid var(--danger); }
  .tip-box-warning { background: var(--warning-bg); border-right: 3px solid var(--warning); }
  .tip-box-info { background: var(--accent-bg); border-right: 3px solid var(--accent); }
  .tip-box-success { background: var(--success-bg); border-right: 3px solid var(--success); }
  .tip-box-purple { background: var(--purple-bg); border-right: 3px solid var(--purple); }
  .tip-box-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
  .tip-box-title.danger { color: var(--danger); }
  .tip-box-title.warning { color: var(--warning); }
  .tip-box-title.info { color: var(--accent-2); }
  .tip-box-title.success { color: var(--success); }
  .tip-box-title.purple { color: var(--purple); }
  .form-list { list-style: none; }
  .form-list li { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .form-list li:last-child { border-bottom: none; }
  .form-list li::before { content: "\1F4CB"; font-size: 14px; }
  .class-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .class-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .class-code { font-size: 18px; font-weight: 800; color: var(--accent-2); background: var(--accent-bg); padding: 4px 12px; border-radius: 8px; }
  .class-name { font-weight: 600; margin-bottom: 6px; }
  .class-desc { color: var(--text-2); font-size: 13px; }
  .class-when { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-3); }
  .class-when strong { color: var(--text-2); }
  .tip-category { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .tip-category-header { padding: 14px 16px; background: var(--surface-2); font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .tip-category-icon { font-size: 22px; }
  .tip-category-chevron { margin-right: auto; color: var(--text-3); transition: transform 0.2s; }
  .tip-category.expanded .tip-category-chevron { transform: rotate(90deg); }
  .tip-category-body { display: none; }
  .tip-category.expanded .tip-category-body { display: block; }
  .tip-item { padding: 12px 16px; border-top: 1px solid var(--border); }
  .tip-item-q { font-weight: 700; color: var(--accent-2); margin-bottom: 6px; font-size: 14px; }
  .tip-item-a { color: var(--text); font-size: 14px; line-height: 1.6; }
  .tip-item-a strong { color: var(--accent-2); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); width: 100%; max-width: 600px; max-height: 85vh; border-radius: 16px 16px 0 0; overflow-y: auto; animation: slideUp 0.25s; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @media (min-width: 768px) { .modal-overlay { align-items: center; padding: 24px; } .modal { border-radius: 16px; max-height: 80vh; } }
  .modal-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-close { color: var(--text-2); padding: 4px 8px; font-size: 14px; font-weight: 600; }
  .modal-body { padding: 16px; }
  .modal-title { font-size: 18px; font-weight: 800; }
  .station-option { padding: 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
  .station-option:hover { border-color: var(--accent); }
  .station-option.selected { border-color: var(--accent); background: var(--accent-bg); }
  .station-option-name { font-weight: 700; font-size: 16px; }
  .station-option-detail { color: var(--text-2); font-size: 13px; margin-top: 4px; }
  .profile-hero { background: linear-gradient(135deg, var(--surface-2), var(--surface)); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .profile-hero-name { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .profile-hero-meta { color: var(--text-2); font-size: 14px; }
  .profile-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 16px; }
  .profile-stat { background: var(--bg); padding: 10px; border-radius: 8px; }
  .profile-stat-label { font-size: 11px; color: var(--text-3); }
  .profile-stat-value { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .role-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 8px; }
  .role-card-name { font-weight: 700; margin-bottom: 4px; }
  .role-card-resp { color: var(--text-2); font-size: 13px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .floating-tip { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 20px; border-radius: 10px; font-weight: 700; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.5); animation: toastIn 0.3s; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  /* ============ ACTIVE CASES ============ */
  .active-case-card {
    background: linear-gradient(135deg, var(--surface), var(--surface-2));
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .active-case-card:hover { border-color: var(--accent-2); transform: translateY(-1px); }
  .active-case-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .active-case-icon { font-size: 28px; }
  .active-case-number {
    font-weight: 800; font-size: 16px; color: var(--accent-2);
    background: var(--accent-bg); display: inline-block;
    padding: 2px 10px; border-radius: 6px;
  }
  .active-case-event { font-size: 13px; color: var(--text-2); margin-top: 4px; }
  .active-case-delete {
    background: transparent; color: var(--text-3); font-size: 18px;
    padding: 4px 8px; border-radius: 6px;
  }
  .active-case-delete:hover { background: var(--danger-bg); color: var(--danger); }
  .active-case-progress-bar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .active-case-progress-fill { height: 100%; background: var(--danger); transition: width 0.3s; }
  .active-case-progress-fill.warning { background: var(--warning); }
  .active-case-progress-fill.success { background: var(--success); }
  .active-case-progress-text { font-size: 12px; color: var(--text-2); margin-top: 6px; font-weight: 600; }

  .active-case-detail-hero {
    background: linear-gradient(135deg, var(--accent-bg), var(--purple-bg));
    border: 1px solid var(--accent);
    border-radius: 16px; padding: 18px; margin-bottom: 16px;
  }
  .active-case-detail-number {
    font-weight: 800; font-size: 14px; color: var(--accent-2);
    background: var(--bg); display: inline-block;
    padding: 3px 12px; border-radius: 8px; margin-bottom: 4px;
  }

  .case-action-item {
    padding: 14px 16px; display: flex; gap: 12px; border-top: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s; align-items: flex-start;
  }
  .case-action-item:first-of-type { border-top: none; }
  .case-action-item:hover { background: var(--surface-2); }
  .case-action-item.done .check-box { background: var(--success); border-color: var(--success); }
  .case-action-item.done .check-box::after { content: "\2713"; color: white; font-weight: 800; font-size: 14px; }
  .case-action-item.done .step-title { text-decoration: line-through; color: var(--text-3); }
  .case-action-item.done .step-detail { color: var(--text-3); }
  .case-action-content { flex: 1; display: flex; gap: 12px; align-items: flex-start; }
  .step-num-small {
    width: 24px; height: 24px; border-radius: 50%; background: var(--surface-3);
    color: var(--text-2); display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px; flex-shrink: 0;
  }
  .case-action-item.done .step-num-small { background: var(--success); color: white; }

  /* ============ ADD CASE BUTTON ============ */
  .add-case-btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), var(--purple));
    color: white; padding: 14px; border-radius: 12px;
    font-weight: 700; font-size: 15px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    transition: transform 0.15s;
  }
  .add-case-btn:hover { transform: translateY(-1px); }
  .add-case-confirm {
    flex: 1; background: var(--accent); color: white; padding: 12px;
    border-radius: 10px; font-weight: 700; font-size: 14px;
  }
  .add-case-confirm:hover { background: var(--accent-2); }

  /* ============ ROLE CARD WITH PHONE ============ */
  .role-card-detailed {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 8px;
  }
  .role-card-header {
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .role-card-role {
    font-size: 12px; color: var(--text-3); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .role-card-person { font-weight: 700; font-size: 16px; margin-top: 2px; }
  .role-card-phone {
    background: var(--success-bg); color: var(--success);
    padding: 8px 14px; border-radius: 20px;
    font-weight: 700; font-size: 14px;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s; white-space: nowrap;
  }
  .role-card-phone:hover { background: var(--success); color: white; }
  .phone-icon { font-size: 16px; }
  .phone-number { font-family: 'Heebo', monospace; letter-spacing: 0.5px; }

</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">מדריך רמ"ח · תפמ"ק</div>
      <div class="top-bar-sub">צ׳קליסט · הנחיות · טיפים</div>
    </div>
    <button class="station-pill" id="station-pill" onclick="openStationPicker()">תחנת לוד 📍</button>
  </div>
  <nav class="tab-bar">
    <button class="tab-btn active" data-target="morning"><div class="tab-btn-icon">☕</div><div class="tab-btn-label">צ׳קליסט בוקר</div></button>
    <button class="tab-btn" data-target="events"><div class="tab-btn-icon">🚨</div><div class="tab-btn-label">מה לעשות?</div></button>
    <button class="tab-btn" data-target="classifications"><div class="tab-btn-icon">📑</div><div class="tab-btn-label">סיווגים</div></button>
    <button class="tab-btn" data-target="tips"><div class="tab-btn-icon">💡</div><div class="tab-btn-label">טיפים</div></button>
  </nav>
  <main class="main">
    <section class="screen active" id="screen-morning"></section>
    <section class="screen" id="screen-events"></section>
    <section class="screen" id="screen-classifications"></section>
    <section class="screen" id="screen-tips"></section>
    <section class="screen" id="screen-profile"></section>
  </main>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">

    immediate: [
      { title: 'בדוק שיש לך סמכות לסגור', detail: 'רמ"ח/ק\' אלמ"ב - רק עוונות. פשע - פרקליטות. מות נאשם בפשע - פרקליט מחוז.' },
      { title: 'בחר עילת סגירה מתאימה', detail: '6 עילות עיקריות - תבחר את המתאימה.' }
    ],
    investigation: [
      { title: 'נל"מ - נסיבות העניין אינן מצדיקות', detail: 'יש ראיות אבל אין עניין ציבורי בהעמדה לדין. עבירה קלה + נסיבות מיוחדות.' },
      { title: 'חוסר ראיות מספיקות', detail: 'יש ראיה לכאורה אבל לא מספיקה להוכחה. סגירה לא חוסמת עתידית.' },
      { title: 'העדר אשמה', detail: 'התברר שאין עבירה כלל. סגירה כללית - לא נשאר רישום פלילי.' },
      { title: 'עבריין לא נודע (על"ן)', detail: 'לא ידועה זהות החשוד. השהיית חקירה - אפשר לפתוח שוב אם יהיו ראיות.' },
      { title: 'התיישנות', detail: 'עבר זמן שעדיין אפשר להעמיד לדין.' },
      { title: 'מות החשוד', detail: 'בעבירת פשע - אישור פרקליט מחוז. בעוונות - רמ"ח מספיק.' }
    ],
    forms: ['החלטת סגירה בפלא"א', 'הודעה למתלונן (חובה)'],
    tips: [
      { type: 'danger', title: '⚠ הודעה למתלונן', text: 'חובה ע"פ סעיף 63 לחסד"פ! המתלונן יכול לערור תוך 30 יום.' },
      { type: 'warning', title: '⏱ דדליין ערר', text: '30 יום למתלונן. עבירות מין/אלימות פשע: 6 חודשים מקס\' להחלטה על הערר.' },
      { type: 'info', title: '📋 הליך הערר', text: 'מועבר לק\' מאשר בכיר. אם החליט להמליץ לדחות, מועבר לפרקליטות המדינה (מנהל תחום עררים).' },
      { type: 'success', title: '✓ אופציה: חידוש חקירה', text: 'הקצין המאשר יכול להחליט לפתוח חקירה מחדש. אז התיק חוזר אליך, אין צורך בפרקליטות.' }
    ]
  }
];
</script>
<script>
function saveChecklist() { localStorage.setItem('checklist', JSON.stringify(state.checklistState)); }
function saveStation() { localStorage.setItem('station', state.station); }
function saveActiveCases() {
  localStorage.setItem('activeCases', JSON.stringify(state.activeCases));
  localStorage.setItem('caseActionState', JSON.stringify(state.caseActionState));
}

function escapeHtml(text) {
  if (text == null) return '';
  return String(text).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'בוקר טוב';
  if (h < 17) return 'צהריים טובים';
  if (h < 21) return 'ערב טוב';
  return 'לילה טוב';
}

function showToast(msg) {
  const existing = document.querySelector('.floating-tip');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'floating-tip';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function navigate(screen) {
  state.screen = screen;
  state.currentEvent = null;
  state.currentActiveCase = null;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen)?.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(t => {
    t.classList.toggle('active', t.dataset.target === screen);
  });
  window.scrollTo(0, 0);
  render();
}

function openEvent(eventId) {
  state.currentEvent = eventId;
  state.screen = 'events';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-events').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(t => {
    t.classList.toggle('active', t.dataset.target === 'events');
  });
  window.scrollTo(0, 0);
  renderEvents();
}

function openActiveCase(caseId) {
  state.currentActiveCase = caseId;
  state.screen = 'morning';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-morning').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(t => {
    t.classList.toggle('active', t.dataset.target === 'morning');
  });
  window.scrollTo(0, 0);
  renderActiveCaseDetail();
}

function render() {
  const station = STATIONS[state.station];
  document.getElementById('station-pill').textContent = `תחנת ${station.name} 📍`;
  switch (state.screen) {
    case 'morning':
      if (state.currentActiveCase) { renderActiveCaseDetail(); }
      else { renderMorning(); }
      break;
    case 'events': renderEvents(); break;
    case 'classifications': renderClassifications(); break;
    case 'tips': renderTips(); break;
    case 'profile': renderProfile(); break;
  }
}

function renderMorning() {
  const totalItems = MORNING_CHECKLIST.reduce((sum, g) => sum + g.items.length, 0);
  const doneItems = Object.keys(state.checklistState).filter(k => state.checklistState[k]).length;
  const percentage = totalItems ? Math.round(doneItems / totalItems * 100) : 0;
  const station = STATIONS[state.station];

  let activeCasesHtml = '';
  if (state.activeCases.length > 0) {
    activeCasesHtml = `
      <div class="section-header">📂 התיקים שלי (${state.activeCases.length})</div>
      ${state.activeCases.map(c => {
        const event = EVENTS.find(e => e.id === c.eventId);
        if (!event) return '';
        const totalActions = (event.immediate?.length || 0) + (event.investigation?.length || 0);
        const doneActions = countCaseActions(c.id, event);
        const pct = totalActions ? Math.round(doneActions / totalActions * 100) : 0;
        return `
          <div class="active-case-card" onclick="openActiveCase('${c.id}')">
            <div class="active-case-header">
              <div class="active-case-icon">${event.icon}</div>
              <div style="flex: 1;">
                <div class="active-case-number">תיק ${escapeHtml(c.caseNumber)}</div>
                <div class="active-case-event">${escapeHtml(event.name)}</div>
              </div>
              <button class="active-case-delete" onclick="event.stopPropagation(); deleteActiveCase('${c.id}')">🗑</button>
            </div>
            <div class="active-case-progress-bar">
              <div class="active-case-progress-fill ${pct >= 80 ? 'success' : pct >= 40 ? 'warning' : ''}" style="width: ${pct}%"></div>
            </div>
            <div class="active-case-progress-text">${doneActions} / ${totalActions} פעולות הושלמו (${pct}%)</div>
          </div>
        `;
      }).join('')}
    `;
  }

  const html = `
    <div class="morning-hero">
      <div class="morning-hero-greeting">${getGreeting()}, רב'</div>
      <div class="morning-hero-title">צ׳קליסט פתיחת יום</div>
      <div class="morning-hero-sub">תחנת ${station.name} · ${new Date().toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
      <div class="morning-progress"><div class="morning-progress-fill" style="width: ${percentage}%"></div></div>
      <div class="morning-progress-text">${doneItems} / ${totalItems} הושלמו (${percentage}%)</div>
    </div>

    ${activeCasesHtml}

    ${state.activeCases.length > 0 ? '<div class="section-header">צ׳קליסט יומי</div>' : ''}

    ${MORNING_CHECKLIST.map(group => {
      const groupDone = group.items.filter(i => state.checklistState[i.id]).length;
      const groupTotal = group.items.length;
      const allDone = groupDone === groupTotal;
      return `
        <div class="checklist-group">
          <div class="checklist-group-header">
            <div class="checklist-group-title-wrap">
              <span class="checklist-group-icon">${group.icon}</span>
              <span class="checklist-group-title">${escapeHtml(group.title)}</span>
            </div>
            <div class="checklist-group-progress ${allDone ? 'done' : ''}">${groupDone}/${groupTotal}</div>
          </div>
          ${group.items.map(item => `
            <div class="checklist-item ${state.checklistState[item.id] ? 'done' : ''}" onclick="toggleItem('${item.id}')">
              <div class="check-box"></div>
              <div class="checklist-item-text">
                ${escapeHtml(item.text)}
                ${item.detail ? `<div class="checklist-item-detail">${escapeHtml(item.detail)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('')}

    <button class="reset-btn" onclick="resetChecklist()">↻ אפס צ׳קליסט (התחלת יום חדש)</button>
  `;
  document.getElementById('screen-morning').innerHTML = html;
}

function countCaseActions(caseId, event) {
  let count = 0;
  if (event.immediate) {
    event.immediate.forEach((_, idx) => {
      if (state.caseActionState[`${caseId}|i-${idx}`]) count++;
    });
  }
  if (event.investigation) {
    event.investigation.forEach((_, idx) => {
      if (state.caseActionState[`${caseId}|v-${idx}`]) count++;
    });
  }
  return count;
}

function toggleItem(id) {
  state.checklistState[id] = !state.checklistState[id];
  saveChecklist();
  renderMorning();
}

function resetChecklist() {
  if (confirm('לאפס את כל הצ׳קליסט?')) {
    state.checklistState = {};
    saveChecklist();
    renderMorning();
    showToast('הצ׳קליסט אופס - יום חדש!');
  }
}

function deleteActiveCase(caseId) {
  if (!confirm('למחוק את התיק מהרשימה? הפעולות שסומנו ימחקו.')) return;
  state.activeCases = state.activeCases.filter(c => c.id !== caseId);
  Object.keys(state.caseActionState).forEach(k => {
    if (k.startsWith(caseId + '|')) delete state.caseActionState[k];
  });
  saveActiveCases();
  renderMorning();
  showToast('התיק נמחק');
}

function renderActiveCaseDetail() {
  const caseObj = state.activeCases.find(c => c.id === state.currentActiveCase);
  if (!caseObj) { state.currentActiveCase = null; renderMorning(); return; }
  const event = EVENTS.find(e => e.id === caseObj.eventId);
  if (!event) { state.currentActiveCase = null; renderMorning(); return; }

  const totalActions = (event.immediate?.length || 0) + (event.investigation?.length || 0);
  const doneActions = countCaseActions(caseObj.id, event);
  const pct = totalActions ? Math.round(doneActions / totalActions * 100) : 0;

  const html = `
    <button class="back-btn" onclick="closeActiveCase()">← חזרה לצ׳קליסט בוקר</button>

    <div class="active-case-detail-hero">
      <div class="event-detail-icon-row">
        <span class="event-detail-icon">${event.icon}</span>
        <div style="flex: 1;">
          <div class="active-case-detail-number">תיק ${escapeHtml(caseObj.caseNumber)}</div>
          <div class="event-detail-title" style="font-size: 18px;">${escapeHtml(event.name)}</div>
        </div>
      </div>
      <div class="event-detail-classifications">
        ${event.classifications.map(c => `<span class="pill ${c.type}">${escapeHtml(c.text)}</span>`).join('')}
      </div>
      <div class="active-case-progress-bar" style="margin-top: 14px;">
        <div class="active-case-progress-fill ${pct >= 80 ? 'success' : pct >= 40 ? 'warning' : ''}" style="width: ${pct}%"></div>
      </div>
      <div class="active-case-progress-text" style="text-align: center;">${doneActions} / ${totalActions} פעולות הושלמו (${pct}%)</div>
    </div>

    ${event.immediate ? `
      <div class="step-list">
        <div class="step-list-title"><span class="step-list-icon">🔥</span>פעולות מיידיות</div>
        ${event.immediate.map((s, i) => {
          const key = `${caseObj.id}|i-${i}`;
          const done = state.caseActionState[key];
          return `
            <div class="case-action-item ${done ? 'done' : ''}" onclick="toggleCaseAction('${caseObj.id}', 'i-${i}')">
              <div class="check-box"></div>
              <div class="case-action-content">
                <div class="step-num-small">${i+1}</div>
                <div style="flex: 1;">
                  <div class="step-title">${escapeHtml(s.title)}</div>
                  <div class="step-detail">${escapeHtml(s.detail)}</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>` : ''}

    ${event.investigation ? `
      <div class="step-list">
        <div class="step-list-title"><span class="step-list-icon">🔍</span>המשך החקירה</div>
        ${event.investigation.map((s, i) => {
          const key = `${caseObj.id}|v-${i}`;
          const done = state.caseActionState[key];
          return `
            <div class="case-action-item ${done ? 'done' : ''}" onclick="toggleCaseAction('${caseObj.id}', 'v-${i}')">
              <div class="check-box"></div>
              <div class="case-action-content">
                <div class="step-num-small">${i+1}</div>
                <div style="flex: 1;">
                  <div class="step-title">${escapeHtml(s.title)}</div>
                  <div class="step-detail">${escapeHtml(s.detail)}</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>` : ''}

    ${event.forms && event.forms.length ? `
      <div class="card">
        <div class="card-header"><div class="card-title">📋 טפסים נדרשים</div></div>
        <div class="card-body">
          <ul class="form-list">${event.forms.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>
        </div>
      </div>` : ''}
  `;
  document.getElementById('screen-morning').innerHTML = html;
}

function toggleCaseAction(caseId, actionKey) {
  const key = `${caseId}|${actionKey}`;
  state.caseActionState[key] = !state.caseActionState[key];
  saveActiveCases();
  renderActiveCaseDetail();
}

function closeActiveCase() {
  state.currentActiveCase = null;
  renderMorning();
}

function renderEvents() {
  if (state.currentEvent) { renderEventDetail(); return; }
  document.getElementById('screen-events').innerHTML = `
    <div class="page-header">
      <div class="page-title">מה לעשות?</div>
      <div class="page-sub">בחר סוג אירוע - תקבל את שרשרת ההנחיות, סיווג, וטיפים</div>
    </div>
    <div class="search-box">
      <span>🔍</span>
      <input type="text" placeholder="חפש סוג אירוע..." oninput="filterEvents(this.value)" id="event-search" />
    </div>
    <div class="event-grid" id="event-grid">
      ${EVENTS.map(e => `
        <div class="event-tile" onclick="openEvent('${e.id}')">
          <span class="event-tile-icon">${e.icon}</span>
          <div class="event-tile-name">${escapeHtml(e.name)}</div>
          <div class="event-tile-class ${e.severity === 'critical' ? 'critical' : ''}">${escapeHtml(e.classification)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function filterEvents(query) {
  const q = query.trim().toLowerCase();
  const grid = document.getElementById('event-grid');
  const filtered = EVENTS.filter(e =>
    !q || e.name.toLowerCase().includes(q) || e.description.toLowerCase().includes(q) || e.classification.toLowerCase().includes(q)
  );
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column: 1 / -1;"><div class="empty-icon">🤷</div><div>לא נמצא אירוע תואם</div></div>`;
  } else {
    grid.innerHTML = filtered.map(e => `
      <div class="event-tile" onclick="openEvent('${e.id}')">
        <span class="event-tile-icon">${e.icon}</span>
        <div class="event-tile-name">${escapeHtml(e.name)}</div>
        <div class="event-tile-class ${e.severity === 'critical' ? 'critical' : ''}">${escapeHtml(e.classification)}</div>
      </div>
    `).join('');
  }
}

function renderEventDetail() {
  const event = EVENTS.find(e => e.id === state.currentEvent);
  if (!event) { state.currentEvent = null; renderEvents(); return; }
  document.getElementById('screen-events').innerHTML = `
    <button class="back-btn" onclick="closeEvent()">← חזרה לרשימת אירועים</button>

    <div class="event-detail-header">
      <div class="event-detail-icon-row">
        <span class="event-detail-icon">${event.icon}</span>
        <div><div class="event-detail-title">${escapeHtml(event.name)}</div></div>
      </div>
      <div style="color: var(--text-2); font-size: 14px; margin-top: 4px;">${escapeHtml(event.description)}</div>
      <div class="event-detail-classifications">
        ${event.classifications.map(c => `<span class="pill ${c.type}">${escapeHtml(c.text)}</span>`).join('')}
      </div>
    </div>

    <button class="add-case-btn" onclick="openAddCaseModal('${event.id}')">
      <span style="font-size: 22px;">➕</span>
      <span>פתח כתיק שלי (עם מספר תיק וסימון פעולות)</span>
    </button>

    ${event.immediate ? `
      <div class="step-list">
        <div class="step-list-title"><span class="step-list-icon">🔥</span>פעולות מיידיות</div>
        ${event.immediate.map((s, i) => `
          <div class="step">
            <div class="step-num">${i+1}</div>
            <div class="step-content">
              <div class="step-title">${escapeHtml(s.title)}</div>
              <div class="step-detail">${escapeHtml(s.detail)}</div>
            </div>
          </div>
        `).join('')}
      </div>` : ''}
    ${event.investigation ? `
      <div class="step-list">
        <div class="step-list-title"><span class="step-list-icon">🔍</span>המשך החקירה</div>
        ${event.investigation.map((s, i) => `
          <div class="step">
            <div class="step-num">${i+1}</div>
            <div class="step-content">
              <div class="step-title">${escapeHtml(s.title)}</div>
              <div class="step-detail">${escapeHtml(s.detail)}</div>
            </div>
          </div>
        `).join('')}
      </div>` : ''}
    ${event.forms && event.forms.length ? `
      <div class="card">
        <div class="card-header"><div class="card-title">📋 טפסים נדרשים</div></div>
        <div class="card-body">
          <ul class="form-list">${event.forms.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>
        </div>
      </div>` : ''}
    ${event.tips && event.tips.length ? `
      <div class="section-header">💡 טיפים לנבחנים ולעבודה</div>
      ${event.tips.map(t => `
        <div class="tip-box tip-box-${t.type}">
          <div class="tip-box-title ${t.type}">${escapeHtml(t.title)}</div>
          <div>${t.text}</div>
        </div>
      `).join('')}` : ''}
  `;
}

function closeEvent() { state.currentEvent = null; renderEvents(); }

function openAddCaseModal(eventId) {
  const event = EVENTS.find(e => e.id === eventId);
  if (!event) return;
  document.getElementById('modal-title').textContent = 'פתיחת תיק חדש';
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align: center; margin-bottom: 16px;">
      <div style="font-size: 48px;">${event.icon}</div>
      <div style="font-weight: 700; font-size: 16px; margin-top: 8px;">${escapeHtml(event.name)}</div>
      <div style="color: var(--text-2); font-size: 13px;">${escapeHtml(event.description)}</div>
    </div>

    <div style="margin-bottom: 16px;">
      <label style="display: block; font-weight: 600; margin-bottom: 6px;">מספר תיק (פלא"א)</label>
      <input type="text" id="case-number-input" placeholder="לדוגמה: 4509 או 2026-4509"
        style="width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 16px; direction: rtl;"
        autofocus />
    </div>

    <div class="tip-box tip-box-info" style="margin-bottom: 0;">
      <div class="tip-box-title info">📌 איך זה עובד?</div>
      <div>אחרי שתפתח את התיק, הוא יופיע ב"צ׳קליסט בוקר" שלך. תוכל לסמן כל פעולה שביצעת ולעקוב אחר ההתקדמות שלך בתיק.</div>
    </div>

    <div style="display: flex; gap: 8px; margin-top: 20px;">
      <button class="reset-btn" onclick="closeModal()" style="margin-top: 0;">ביטול</button>
      <button class="add-case-confirm" onclick="confirmAddCase('${eventId}')">פתח תיק</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('case-number-input')?.focus(), 50);
}

function confirmAddCase(eventId) {
  const input = document.getElementById('case-number-input');
  const caseNumber = input.value.trim();
  if (!caseNumber) {
    showToast('יש להזין מספר תיק');
    input.focus();
    return;
  }
  // check for duplicates
  if (state.activeCases.find(c => c.eventId === eventId && c.caseNumber === caseNumber)) {
    showToast('תיק עם מספר זה כבר קיים');
    return;
  }
  const newCase = {
    id: 'case-' + Date.now(),
    eventId: eventId,
    caseNumber: caseNumber,
    createdAt: new Date().toISOString()
  };
  state.activeCases.push(newCase);
  saveActiveCases();
  closeModal();
  showToast('התיק נוסף לצ׳קליסט שלך!');
  navigate('morning');
}

function renderClassifications() {
  document.getElementById('screen-classifications').innerHTML = `
    <div class="page-header">
      <div class="page-title">סיווגי תיקים</div>
      <div class="page-sub">כל הסיווגים במשטרת ישראל - מתי להשתמש בכל אחד</div>
    </div>
    <div class="tip-box tip-box-info" style="margin-bottom: 16px;">
      <div class="tip-box-title info">📑 חוקי הסיווג</div>
      <div>סיווג נכון = טיפול נכון. תמיד אפשר לשנות סיווג אם מתבררות עובדות חדשות. תיק שהתחיל ש.כ ומסתבר שהצתה - פותחים פ.א חדש.</div>
    </div>
    ${CLASSIFICATIONS_REF.map(c => `
      <div class="class-card">
        <div class="class-card-header"><span class="class-code">${escapeHtml(c.code)}</span></div>
        <div class="class-name">${escapeHtml(c.name)}</div>
        <div class="class-desc">${escapeHtml(c.desc)}</div>
        <div class="class-when"><strong>מתי:</strong> ${escapeHtml(c.when)}</div>
      </div>
    `).join('')}
  `;
}

function renderTips() {
  document.getElementById('screen-tips').innerHTML = `
    <div class="page-header">
      <div class="page-title">טיפים לנבחנים</div>
      <div class="page-sub">שאלות נפוצות במבחן תפמ"ק - תשובות מדויקות עם מקורות</div>
    </div>
    ${TIPS_CATEGORIES.map(cat => `
      <div class="tip-category ${state.expandedTips.has(cat.id) ? 'expanded' : ''}">
        <div class="tip-category-header" onclick="toggleTipCategory('${cat.id}')">
          <span class="tip-category-icon">${cat.icon}</span>
          <span>${escapeHtml(cat.title)}</span>
          <span class="tip-category-chevron">›</span>
        </div>
        <div class="tip-category-body">
          ${cat.tips.map(t => `
            <div class="tip-item">
              <div class="tip-item-q">❓ ${escapeHtml(t.q)}</div>
              <div class="tip-item-a">${t.a}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function toggleTipCategory(id) {
  if (state.expandedTips.has(id)) { state.expandedTips.delete(id); } else { state.expandedTips.add(id); }
  renderTips();
}

function renderProfile() {
  const s = STATIONS[state.station];

  const rolesHtml = s.keyRoles.map(r => {
    const hasPhone = r.phone && r.phone.length > 0;
    const hasName = r.name && r.name.length > 0;
    if (hasName && hasPhone) {
      return `
        <div class="role-card-detailed">
          <div class="role-card-header">
            <div>
              <div class="role-card-role">${escapeHtml(r.role || r.name)}</div>
              <div class="role-card-person">${escapeHtml(r.name)}</div>
            </div>
            <a href="tel:${escapeHtml(r.phone)}" class="role-card-phone">
              <span class="phone-icon">📞</span>
              <span class="phone-number">${escapeHtml(r.phone)}</span>
            </a>
          </div>
          ${r.resp ? `<div class="role-card-resp" style="margin-top: 8px;">${escapeHtml(r.resp)}</div>` : ''}
        </div>
      `;
    }
    if (hasName && !hasPhone) {
      return `
        <div class="role-card-detailed">
          <div class="role-card-header">
            <div>
              <div class="role-card-role">${escapeHtml(r.role || r.name)}</div>
              <div class="role-card-person">${escapeHtml(r.name)}</div>
            </div>
            <span style="color: var(--text-3); font-size: 12px;">אין טלפון</span>
          </div>
          ${r.resp ? `<div class="role-card-resp" style="margin-top: 8px;">${escapeHtml(r.resp)}</div>` : ''}
        </div>
      `;
    }
    // No name (only role) - LOD-style
    return `
      <div class="role-card">
        <div class="role-card-name">${escapeHtml(r.name)}</div>
        <div class="role-card-resp">${escapeHtml(r.resp)}</div>
      </div>
    `;
  }).join('');

  document.getElementById('screen-profile').innerHTML = `
    <button class="back-btn" onclick="navigate('morning')">← חזרה</button>
    <div class="profile-hero">
      <div class="profile-hero-name">${escapeHtml(s.fullName)}</div>
      <div class="profile-hero-meta">${escapeHtml(s.district)}</div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-label">אוכלוסייה</div>
          <div class="profile-stat-value" style="font-size: 13px;">${escapeHtml(s.population)}</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-label">אתגרים עיקריים</div>
          <div class="profile-stat-value" style="font-size: 13px;">${escapeHtml(s.challenges)}</div>
        </div>
      </div>
    </div>
    <div class="tip-box tip-box-purple" style="margin-bottom: 16px;">
      <div class="tip-box-title purple">💼 הערות מהשטח</div>
      <div>${escapeHtml(s.notes)}</div>
    </div>
    <div class="section-header">בעלי תפקידים מרכזיים</div>
    ${rolesHtml}
    <div class="section-header">החלף תחנה</div>
    <button class="reset-btn" onclick="openStationPicker()" style="margin-top: 0;">בחר תחנה אחרת</button>
  `;
}

function openStationPicker() {
  document.getElementById('modal-title').textContent = 'בחר תחנה';
  const body = `
    ${Object.values(STATIONS).map(s => `
      <div class="station-option ${state.station === s.id ? 'selected' : ''}" onclick="selectStation('${s.id}')">
        <div class="station-option-name">${escapeHtml(s.fullName)}</div>
        <div class="station-option-detail">${escapeHtml(s.district)} · ${escapeHtml(s.population)}</div>
      </div>
    `).join('')}
    <button class="reset-btn" onclick="closeModal(); navigate('profile');" style="margin-top: 16px;">📋 פרטי תחנה מלאים</button>
  `;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}

function selectStation(id) {
  state.station = id;
  saveStation();
  closeModal();
  render();
  showToast(`עברת ל${STATIONS[id].fullName}`);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab-btn').forEach(t => {
    t.addEventListener('click', () => navigate(t.dataset.target));
  });
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
  });
  render();
});
</script>
</body>
</html>
